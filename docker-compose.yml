services:

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    # منطق تاریخ/ساعت اپ (زمان‌بندی نوتیف، مرز «امروز»، ساعت سکوت) بر اساس این TZ کار می‌کند
    environment:
      - TZ=Asia/Tehran
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - league-net

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: league_db
      POSTGRES_USER: league_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league_user -d league_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - league-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - league-net

volumes:
  postgres_data:
  redis_data:

networks:
  league-net:
    driver: bridge
